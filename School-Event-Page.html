<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Olympic Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#050505;
--card:#111;
--text:#ffffff;
--muted:#9a9a9a;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,system-ui;
color:var(--text);
background:
radial-gradient(circle at 20% 20%, rgba(45,127,249,0.15), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(255,59,48,0.15), transparent 40%),
#050505;
padding:0 40px;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:40px 0;
max-width:1300px;
margin:auto;
}
.logo{
font-weight:900;
letter-spacing:-1px
}
.btn{
background:white;
color:black;
padding:14px 28px;
border-radius:999px;
font-weight:700;
text-decoration:none;
}
.hero{
max-width:1300px;
margin:auto;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:50px;
align-items:center;
}
.hero h1{
font-size:clamp(4rem,9vw,8rem);
line-height:.8;
letter-spacing:-6px;
margin:0;
text-transform:uppercase;
}
.desc{
color:var(--muted);
font-size:1.2rem;
margin:30px 0;
max-width:500px
}
.badge{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:6px 16px;
border-radius:999px;
display:inline-flex;
align-items:center;
font-size:.75rem;
margin-bottom:20px
}
.dot{
width:8px;
height:8px;
background:#34c759;
border-radius:50%;
margin-right:10px;
box-shadow:0 0 10px #34c759
}
.hero-image{
height:620px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 60px 140px rgba(0,0,0,.7);
}
.hero-image img{
width:100%;
height:100%;
object-fit:cover;
filter:contrast(1.1) brightness(.9)
}
.hero-image::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.6), transparent)
}
.grid{
max-width:1300px;
margin:80px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px
}
.card{
background:linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
border:1px solid rgba(255,255,255,0.08);
border-radius:32px;
padding:30px;
min-height:200px;
display:flex;
flex-direction:column;
justify-content:space-between;
backdrop-filter:blur(20px);
transition:.3s
}
.card:hover{
transform:translateY(-8px) scale(1.02);
border-color:rgba(255,255,255,.2)
}
.wide{grid-column:span 2}
.category{
font-size:.7rem;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
font-weight:700
}
.title{
font-size:1.8rem;
margin:10px 0
}
.date{
font-weight:700
}
.time{
font-size:.9rem;
color:var(--muted)
}
@media(max-width:1000px){
.hero{grid-template-columns:1fr}
.hero-image{height:400px}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
<div class="logo">O‑24 / ATHLETICS</div>
<a class="btn" href="#">Sign up to compete</a>
</nav>

<section class="hero">
<div>
<div class="badge"><span class="dot"></span> LIVE SCHEDULE</div>
<h1>Champions<br>Rise Here</h1>
<p class="desc">The official school Olympic games. Compete, break records and prove your greatness.</p>
</div>

<div class="hero-image">
<img src="Hero image.jpeg" alt="athlete">
</div>
</section>

<section class="grid" id="grid"></section>

<script>
const events=[
{title:"Varsity Sprints",cat:"Track",size:"wide"},
{title:"Shot Put",cat:"Field"},
{title:"Long Jump",cat:"Field"},
{title:"3v3 Basketball",cat:"Court",size:"wide"},
{title:"Relay Finals",cat:"Track"},
{title:"Obstacle Course",cat:"Mixed"},
{title:"Tug of War",cat:"Team",size:"wide"}
]
function rand(){
const days=["Mon","Tue","Wed","Thu","Fri","Sat"]
let d=days[Math.floor(Math.random()*days.length)]
let n=Math.floor(Math.random()*28)+1
let h=Math.floor(Math.random()*6)+8
return{date:`${d}, Oct ${n}`,time:`${h}:00 AM`}
}
function render(){
let g=document.getElementById("grid")
g.innerHTML=""
events.forEach(e=>{
let r=rand()
let card=document.createElement("div")
card.className="card "+(e.size||"")
card.innerHTML=`
<div>
<span class="category">${e.cat}</span>
<div class="title">${e.title}</div>
</div>
<div>
<div class="date">${r.date}</div>
<div class="time">Starts at ${r.time}</div>
</div>`

g.appendChild(card)
})
}
render()
</script>

</body>
</html>
