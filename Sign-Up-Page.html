<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--text:#fff;
--muted:#9a9a9a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
color:var(--text);

background:
radial-gradient(circle at 20% 20%, rgba(45,127,249,0.15), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(255,59,48,0.15), transparent 40%),
#050505;

padding:0 40px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:40px 0;
max-width:1100px;
margin:auto;
}


/* Updated Logo Styles */
.logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo-container img {
    height: 60px; /* Adjusted size for the crest */
    width: auto;
}
.logo-container span {
    font-weight: 900;
    letter-spacing: -1px;
    font-size: 1.4rem;
}

.back{
color:white;
text-decoration:none;
opacity:.8;
}

.container{
max-width:700px;
margin:120px auto;
}

.card{
background:linear-gradient(
145deg,
rgba(255,255,255,0.05),
rgba(255,255,255,0.02)
);

border:1px solid rgba(255,255,255,0.1);
border-radius:32px;
padding:40px;
backdrop-filter:blur(20px);
box-shadow:0 40px 120px rgba(0,0,0,.6);
}

.title{
font-size:2rem;
margin-bottom:30px;
letter-spacing:-1px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input{
display:flex;
flex-direction:column;
}

label{
font-size:.75rem;
text-transform:uppercase;
letter-spacing:2px;
color:var(--muted);
margin-bottom:8px;
}

input,select{
background:#0c0c0c;
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:14px;
color:white;
font-family:Inter;
}

input:focus,select:focus{
outline:none;
border-color:white;
}

button{
margin-top:30px;
background:white;
color:black;
border:none;
padding:14px 28px;
border-radius:999px;
font-weight:700;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

@media(max-width:700px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<nav>
<div class="logo-container">
    <img src="1001724963.png" alt="Calvary Crown Academy Logo">
    <span>ICO-26</span>
</div>
<a class="back" href="School-Event-Page.html">← Back</a>
</nav>

<div class="container">
<div class="card">

<div class="title">Student Registration</div>

<form>

<div class="grid">

<div class="input">
<label>Student ID</label>
<input type="text" required>
</div>

<div class="input">
<label>Name</label>
<input type="text" required>
</div>

<div class="input">
<label>Sports Activity</label>
<select required>
<option value="">Select sport</option>
<option>Track</option>
<option>Basketball</option>
<option>Long Jump</option>
<option>Shot Put</option>
<option>Relay</option>
<option>Obstacle Course</option>
</select>
</div>

<div class="input">
<label>Class</label>
<input type="text" placeholder="SS1 / SS2 / SS3">
</div>

<div class="input">
<label>Campus</label>
<select>
<option>Airport Road Campus</option>
<option>Ekenwhan Road Campus</option>
<option>Ewah Road Campus</option>
<option>Ogida Campus</option>
<option>Ugbowo Campus</option>

</select>
</div>

</div>

<button type="submit">Register Student</button>

</form>

</div>
</div>

</body>
</html>
